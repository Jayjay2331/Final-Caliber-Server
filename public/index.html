<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel · Manual Connect</title>

    <style>
        /* === YOUR UI UNCHANGED === */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000000;
            font-family: 'Segoe UI', 'Courier New', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .admin-card {
            max-width: 1100px;
            width: 100%;
            background: #050505;
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px #1a1a1a;
            overflow: hidden;
        }

        .admin-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            background: #000000;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }

        h2 { color: #e0e0e0; font-weight: 600; font-size: 1.8rem; }

        .status-badge {
            font-family: monospace;
            font-size: 0.8rem;
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #aaaaaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.connected { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .status-dot.disconnected { background: #e74c3c; box-shadow: 0 0 4px #e74c3c; }

        .input-area {
            padding: 1.8rem 2rem;
            background: #000000;
            border-bottom: 1px solid #111;
        }

        .button-group { display: flex; gap: 12px; margin-bottom: 20px; }

        .command-wrapper {
            display: flex;
            gap: 12px;
        }

        .command-input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 100px;
            padding: 0.9rem 1.5rem;
            color: #fff;
            outline: none;
        }

        .blue-btn {
            background: #2563eb;
            border: none;
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 100px;
            cursor: pointer;
        }

        .log-section { padding: 0 2rem 2rem; }

        #log {
            background: #030303;
            height: 380px;
            overflow-y: auto;
            padding: 1.2rem;
            color: #ccc;
            border-radius: 2rem;
            border: 1px solid #181818;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="admin-card">
    <div class="admin-header">
        <h2>◈ FINAL CALIBER MANAGEMENT PANEL ◈</h2>

        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <div class="input-area">
        <div class="button-group">
            <button id="connectBtn" class="blue-btn">Connect to Server</button>
        </div>

        <div class="command-wrapper">
            <input type="text" id="cmd" class="command-input" placeholder="Command goes here." disabled>
            <button id="sendBtn" class="blue-btn" disabled>➤ SEND</button>
        </div>
    </div>

    <div class="log-section">
        <div id="log"></div>
    </div>
</div>

<script>
    // ✅ FIXED: correct WebSocket URL auto-detect
    const WS_URL = location.origin.replace("http", "ws");

    let ws;
    let isConnected = false;

    const logDiv = document.getElementById("log");
    const cmdInput = document.getElementById("cmd");
    const connectBtn = document.getElementById("connectBtn");
    const sendBtn = document.getElementById("sendBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerText += `[${time}] ${msg}\n`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function setStatus(state) {
        isConnected = state;

        if (state) {
            statusDot.className = "status-dot connected";
            statusText.innerText = "Connected";
            cmdInput.disabled = false;
            sendBtn.disabled = false;
            connectBtn.disabled = true;
        } else {
            statusDot.className = "status-dot disconnected";
            statusText.innerText = "Disconnected";
            cmdInput.disabled = true;
            sendBtn.disabled = true;
            connectBtn.disabled = false;
        }
    }

    function connect() {
        log("Connecting...");

        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
            log("✔ Connected to server");
            setStatus(true);
        };

        ws.onmessage = (e) => {
            log(e.data);
        };

        ws.onclose = () => {
            log("Disconnected");
            setStatus(false);
        };

        ws.onerror = () => {
            log("Connection error");
            setStatus(false);
        };
    }

    function sendCommand() {
        const cmd = cmdInput.value.trim();
        if (!cmd || !ws || ws.readyState !== 1) return;

        ws.send(cmd);
        log("> " + cmd);
        cmdInput.value = "";
    }

    connectBtn.onclick = connect;
    sendBtn.onclick = sendCommand;

    cmdInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendCommand();
    });

    log("Panel ready.");
    setStatus(false);
</script>

</body>
</html>
