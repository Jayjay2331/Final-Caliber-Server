<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel · Manual Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Segoe UI', 'Courier New', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .admin-card {
            max-width: 1100px;
            width: 100%;
            background: #050505;
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px #1a1a1a;
            overflow: hidden;
        }

        .admin-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            background: #000000;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }

        h2 {
            color: #e0e0e0;
            font-weight: 600;
            letter-spacing: -0.5px;
            font-size: 1.8rem;
        }

        .status-badge {
            font-family: monospace;
            font-size: 0.8rem;
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #aaaaaa;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            display: inline-block;
        }
        .status-dot.connected {
            background: #2ecc71;
            box-shadow: 0 0 6px #2ecc71;
        }
        .status-dot.disconnected {
            background: #e74c3c;
            box-shadow: 0 0 4px #e74c3c;
        }

        .input-area {
            padding: 1.8rem 2rem;
            background: #000000;
            border-bottom: 1px solid #111111;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .command-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .command-input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 100px;
            padding: 0.9rem 1.5rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.95rem;
            color: #f0f0f0;
            outline: none;
            transition: all 0.2s;
        }
        .command-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background: #000000;
        }
        .command-input::placeholder {
            color: #3a3a3a;
        }
        .command-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Blue buttons */
        .blue-btn {
            background: #2563eb;
            border: none;
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 100px;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .blue-btn:hover {
            background: #3b82f6;
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .blue-btn:active {
            background: #1d4ed8;
            transform: scale(0.95);
        }
        .blue-btn:disabled {
            background: #1e3a8a;
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .log-section {
            padding: 0 2rem 2rem 2rem;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: #5a5a5a;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0 4px;
        }
        #log {
            background: #030303;
            border-radius: 2rem;
            padding: 1.2rem;
            height: 380px;
            overflow-y: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #cccccc;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #181818;
            box-shadow: inset 0 0 10px #000000, 0 4px 12px rgba(0,0,0,0.6);
        }

        #log::-webkit-scrollbar {
            width: 8px;
        }
        #log::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 20px;
        }
        #log::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 20px;
        }
        #log::-webkit-scrollbar-thumb:hover {
            background: #3f3f3f;
        }

        @media (max-width: 640px) {
            body {
                padding: 0.8rem;
            }
            .admin-card {
                border-radius: 2rem;
            }
            .admin-header, .input-area, .log-section {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .command-input, .blue-btn {
                padding: 0.7rem 1.2rem;
            }
            h2 {
                font-size: 1.4rem;
            }
            #log {
                border-radius: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="admin-header">
        <h2>◈ FINAL CALIBER MANAGEMENT PANEL ◈</h2>
        <div class="status-badge" id="statusBadge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <div class="input-area">
        <div class="button-group">
            <button id="connectBtn" class="blue-btn">Connect to Server</button>
        </div>
        <div class="command-wrapper">
            <input type="text" id="cmd" class="command-input" placeholder="Command goes here." autocomplete="off" disabled>
            <button id="sendBtn" class="blue-btn" disabled>➤ SEND</button>
        </div>
        <div style="font-size: 0.7rem; color: #3a3a3a; margin-top: 12px; margin-left: 8px;">
            ⚡ example: kick JohnDoe &nbsp;&nbsp;|&nbsp;&nbsp; ban 456
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <span>📡 LIVE SERVER LOGS</span>
            <span>─── terminal style ───</span>
        </div>
        <div id="log"></div>
    </div>
</div>

<script>
    // 🔁 CHANGE THIS to your actual Railway WebSocket URL
    const WS_URL = "wss://YOUR-RAILWAY-URL";
    
    let ws = null;
    let isConnected = false;

    const logDiv = document.getElementById("log");
    const cmdInput = document.getElementById("cmd");
    const connectBtn = document.getElementById("connectBtn");
    const sendBtn = document.getElementById("sendBtn");
    const statusDot = document.getElementById("statusDot");
    const statusTextSpan = document.getElementById("statusText");

    function updateUI(connected) {
        isConnected = connected;
        if (connected) {
            statusDot.className = "status-dot connected";
            statusTextSpan.innerText = "● CONNECTED";
            statusTextSpan.style.color = "#aaa";
            cmdInput.disabled = false;
            sendBtn.disabled = false;
            connectBtn.disabled = true;
            connectBtn.textContent = "✓ Connected";
        } else {
            statusDot.className = "status-dot disconnected";
            statusTextSpan.innerText = "○ DISCONNECTED";
            statusTextSpan.style.color = "#aaa";
            cmdInput.disabled = true;
            sendBtn.disabled = true;
            connectBtn.disabled = false;
            connectBtn.textContent = "🔌 Connect to Server";
        }
    }

    function log(message) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        logDiv.innerText += `[${time}] ${message}\n`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function connectWebSocket() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            log("Already connected or connecting.");
            return;
        }

        // Close any existing socket
        if (ws) {
            ws.close();
            ws = null;
        }

        log(`Connecting to ${WS_URL}...`);
        try {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                log(">>> Connected to server");
                updateUI(true);
            };
            
            ws.onmessage = (event) => {
                log(event.data);
            };
            
            ws.onerror = (err) => {
                log("⚠️ WebSocket error: " + (err.message || "connection issue"));
                // Don't auto-reconnect; just update UI
                if (ws && ws.readyState !== WebSocket.OPEN) {
                    updateUI(false);
                }
            };
            
            ws.onclose = () => {
                log("🔌 Disconnected from server");
                updateUI(false);
                // Manual reconnect only via button
            };
        } catch (e) {
            log("❌ Failed to create WebSocket: " + e);
            updateUI(false);
        }
    }

    function sendCommand() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            log("❗ Not connected to server. Click 'Connect to Server' first.");
            return;
        }
        const cmd = cmdInput.value.trim();
        if (cmd === "") {
            log("⚠️ Empty command ignored.");
            return;
        }
        ws.send(cmd);
        log("> " + cmd);
        cmdInput.value = "";
        cmdInput.focus();
    }

    // Event listeners
    connectBtn.addEventListener("click", connectWebSocket);
    sendBtn.addEventListener("click", sendCommand);
    cmdInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && isConnected) {
            e.preventDefault();
            sendCommand();
        }
    });

    // Initial log message
    log("✦ ADMIN PANEL READY ✦");
    log("Click 'Connect to Server' to establish WebSocket connection.");
    if (WS_URL === "wss://YOUR-RAILWAY-URL") {
        log("⚠️ WARNING: WebSocket URL is still set to placeholder. Update the WS_URL variable in the code.");
    }
    updateUI(false);
</script>
</body>
</html>
