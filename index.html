<!DOCTYPE html>
<html>
<head>
    <title>Server Console</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f12;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        .panel {
            width: 420px;
            height: 520px;
            background: rgba(26, 26, 32, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            padding: 12px;
            background: #22222a;
            color: white;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .output {
            flex: 1;
            padding: 10px;
            background: #111116;
            color: #00ff99;
            overflow-y: auto;
            font-size: 13px;
        }

        .msg {
            margin: 3px 0;
            line-height: 1.4;
        }

        .msg::before {
            content: attr(data-time) " ";
            color: #888;
            font-size: 0.85em;
            margin-right: 8px;
        }

        .sent { color: #66aaff; }
        .server { color: #ffcc00; }
        .system { color: #00ff99; }
        .error { color: #ff5555; }

        .input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: #1a1a20;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            background: #2a2a35;
            color: white;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.4);
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #0066dd;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 102, 221, 0.3);
        }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">[Output]</div>
    <div id="output" class="output"></div>
    <div class="input-area">
        <input id="cmd" placeholder="Enter command (e.g. /ping)" />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let socket = new WebSocket("wss://final-caliber-server.onrender.com");

socket.onopen = () => log("Connected to server", "system");

socket.onmessage = (event) => {
    try {
        let msg = JSON.parse(event.data);
        if (msg.type === "system") {
            log("[SYSTEM] " + msg.msg, "system");
        } else if (msg.type === "update") {
            log("[PLAYER] " + msg.id + " updated", "server");
        } else if (msg.type === "error") {
            log("[ERROR] " + msg.msg, "error");
        }
    } catch (e) {
        log(event.data, "server");
    }
};

socket.onclose = () => log("Disconnected", "error");

function send() {
    let input = document.getElementById("cmd");
    let msg = input.value.trim();

    if (!msg) return;

    socket.send(msg);
    log("> " + msg, "sent");
    input.value = "";
}

function log(text, type) {
    let out = document.getElementById("output");
    let now = new Date().toLocaleTimeString();

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    div.setAttribute("data-time", now);

    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}

document.getElementById("cmd").addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});
</script>
</body>
</html>
